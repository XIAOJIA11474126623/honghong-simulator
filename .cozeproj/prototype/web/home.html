<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- 字体（按需，系统字体时省略；只能用 Google 字体，CSS 地址前缀：https://lf-code-agent.coze.cn/obj/x-ai-cn/fonts/google） -->
  <!-- <link href="https://lf-code-agent.coze.cn/obj/x-ai-cn/fonts/google/google-all-fonts.css" rel="stylesheet"/> -->

  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/jquery/jquery-3.7.1.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/lucide/lucide-1.11.0.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/tailwindcss/tailwindcss-browser-4.2.4.min.js"></script>

  <style type="text/tailwindcss">
    @theme {
      /* === 品牌色 === */
      --color-primary:              #C96F3D;
      --color-primary-container:    #F5E0D0;
      --color-on-primary:           #ffffff;
      /* === 背景 / 表面 === */
      --color-background:                 #FBF3E7;
      --color-surface-container-lowest:   #FFF9F1;
      --color-surface:                    #FFF9F1;
      --color-surface-container:          #F3E8D8;
      --color-surface-container-high:     #EDDFCF;
      --color-surface-container-highest:  #E6D5C0;
      /* === 文字 === */
      --color-on-surface:           #31251B;
      --color-on-surface-variant:   #8B7662;
      /* === 功能色 === */
      --color-success:  #7E9F7A;
      --color-error:    #D94F4F;
      --color-warning:  #E8A84C;
      /* === 边框 === */
      --color-outline:          #C4B5A2;
      --color-outline-variant:  #D9CEBF;
      /* === 圆角 === */
      --radius-sm:   0.375rem;
      --radius-md:   0.5rem;
      --radius-lg:   0.75rem;
      --radius-xl:   1rem;
      --radius-2xl:  1.5rem;
      --radius-full: 9999px;
      /* === 阴影 === */
      --shadow-card:   0 2px 8px rgba(49,37,27,0.08);
      --shadow-float:  0 10px 25px rgba(49,37,27,0.10);
      --shadow-dialog: 0 25px 50px rgba(49,37,27,0.15);
      /* === 字体 === */
      --font-sans: "Noto Sans SC", system-ui, sans-serif;
    }
  </style>

  <!-- 图片兜底 -->
  <script>
    document.addEventListener('error', function (e) {
      const img = e.target;
      if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他';
      const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '🍽', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '🖼';
      const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%23f3f4f6"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" dominant-baseline="central">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%239ca3af" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>
</head>

<body class="bg-background text-on-surface font-sans">

  <!-- @nav:start -->
  <header class="bg-surface sticky top-0 z-40 h-14 flex items-center justify-between px-6 shadow-card">
    <div class="max-w-4xl mx-auto w-full flex items-center justify-between">
      <a href="home.html" class="flex items-center gap-2">
        <i data-lucide="heart" class="text-primary w-5 h-5"></i>
        <span class="font-bold text-lg text-on-surface">哄哄模拟器</span>
      </a>
      <nav class="flex items-center gap-1">
        <a href="home.html" class="px-3 py-1.5 text-sm font-medium text-primary bg-primary/10 rounded-md" aria-current="page">首页</a>
      </nav>
    </div>
  </header>
  <!-- @nav:end -->

  <!-- @main-content:start -->
  <main class="max-w-4xl mx-auto min-h-[calc(100vh-3.5rem)] p-6 flex flex-col items-center justify-center">

    <!-- 标题区域 -->
    <div class="text-center mb-10">
      <h1 class="text-3xl font-bold text-on-surface tracking-tight">哄哄模拟器</h1>
      <p class="text-on-surface-variant text-sm mt-2">学会读懂TA的情绪信号</p>
    </div>

    <!-- 角色选择卡片区域 -->
    <div class="grid grid-cols-2 gap-6 w-full max-w-2xl">

      <!-- 卡片-选择女朋友角色 -->
      <a href="scenarios.html?role=girlfriend"
         id="card-girlfriend"
         class="role-card group bg-surface rounded-2xl shadow-card p-6 flex flex-col items-center text-center cursor-pointer
                border-2 border-transparent hover:shadow-float hover:-translate-y-1 transition-all duration-200 no-underline">
        <div class="w-20 h-20 rounded-full bg-primary/10 flex items-center justify-center mb-4 group-hover:bg-primary/20 transition-colors">
          <i data-lucide="user-round" class="w-10 h-10 text-primary"></i>
        </div>
        <h2 class="text-lg font-bold text-on-surface mb-1.5">我是女朋友</h2>
        <p class="text-sm text-on-surface-variant leading-relaxed">AI扮演男朋友<br>你来哄他开心</p>
      </a>

      <!-- 卡片-选择男朋友角色 -->
      <a href="scenarios.html?role=boyfriend"
         id="card-boyfriend"
         class="role-card group bg-surface rounded-2xl shadow-card p-6 flex flex-col items-center text-center cursor-pointer
                border-2 border-transparent hover:shadow-float hover:-translate-y-1 transition-all duration-200 no-underline">
        <div class="w-20 h-20 rounded-full bg-primary/10 flex items-center justify-center mb-4 group-hover:bg-primary/20 transition-colors">
          <i data-lucide="user" class="w-10 h-10 text-primary"></i>
        </div>
        <h2 class="text-lg font-bold text-on-surface mb-1.5">我是男朋友</h2>
        <p class="text-sm text-on-surface-variant leading-relaxed">AI扮演女朋友<br>你来哄她开心</p>
      </a>

    </div>

    <!-- 产品说明 -->
    <p class="text-xs text-on-surface-variant/70 mt-10 text-center max-w-md leading-relaxed">
      通过模拟常见吵架场景，练习识别情绪信号并学会正确回应
    </p>

  </main>
  <!-- @main-content:end -->

  <script>lucide.createIcons();</script>

  <script>
  $(function() {

    // 角色卡片点击 - 选中态效果
    $('.role-card').on('click', function() {
      var $card = $(this);
      // 移除所有卡片的选中态
      $('.role-card').removeClass('border-primary').addClass('border-transparent');
      // 给当前卡片添加选中态
      $card.removeClass('border-transparent').addClass('border-primary');
    });

    // 角色卡片hover增强 - 鼠标进入时轻微浮起
    $('.role-card').on('mouseenter', function() {
      $(this).css('box-shadow', '0 10px 25px rgba(49,37,27,0.10)');
    }).on('mouseleave', function() {
      // 选中态保持浮起阴影
      if ($(this).hasClass('border-primary')) {
        $(this).css('box-shadow', '0 10px 25px rgba(49,37,27,0.10)');
      } else {
        $(this).css('box-shadow', '');
      }
    });

  });
  </script>

</body>

</html>
